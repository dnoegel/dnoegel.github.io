rver"], ["RTSP / MJPEG", "live stream"], ["Snapshot / motion", "door monitoring"]], "visual": "<div class=\"appwin iot\" data-w=\"380\" data-h=\"250\" style=\"width:380px;height:250px\"><div class=\"iottop\"><span class=\"iotchip\">ESP32-CAM</span> Door Camera<span class=\"iotlive\">● live</span></div><div class=\"iotbody\"><div class=\"camframe\"><span class=\"camrec\">● REC</span><span class=\"camts\">2024-06-20 14:47:53</span><span class=\"cambox\"></span><span class=\"camlabel\">OV2640 · RTSP / MJPEG stream</span></div></div></div>"}, {"id": "esp_climate", "era": "hw", "year": "2023", "title": "Climate IR Remote", "tag": "IoT · embedded C++", "blurb": "Bridges an air-conditioner's IR remote to MQTT so it can be controlled from Home Assistant.", "desc": "An ESP32 with a KY-005 IR emitter replays captured air-conditioner / climate remote codes on command, exposing setpoint and mode control over MQTT so the A/C joins the smart home.", "facts": ["Arduino / C++", "ESP32", "2023", "MQTT"], "hi": ["Made a dumb IR air-conditioner smart-home controllable"], "tech": [["KY-005 IR emitter", "replays captured A/C remote codes"], ["MQTT control", "setpoint / mode from Home Assistant"], ["ESP32", "Wi-Fi bridge"]], "visual": "<div class=\"appwin iot\" data-w=\"380\" data-h=\"250\" style=\"width:380px;height:250px\"><div class=\"iottop\"><span class=\"iotchip\">ESP32</span> Climate IR Remote<span class=\"iotlive\">● live</span></div><div class=\"iotbody\"><div class=\"iotrow2\"><div class=\"thermo\"><b>21.5°</b><span>set</span></div><div class=\"rows\" style=\"gap:8px;justify-content:center\"><div class=\"acmode\"><span class=\"on\">❄ Cool</span><span>☀ Heat</span><span>Fan</span></div><span class=\"csub2\">KY-005 IR emitter → signal sent</span><span class=\"csub2\">MQTT controlled</span></div></div></div></div>"}, {"id": "esp_altherma", "era": "hw", "year": "2023", "title": "Heat-Pump Monitor", "tag": "IoT · embedded C++", "blurb": "Monitors a Daikin Altherma heat pump - flow/return temperatures and controller telemetry.", "desc": "DS18B20 probes on the heating loop report flow and return temperatures from an ESP32, combined with ESPAltherma reading the Daikin Altherma controller directly - feeding heat-pump telemetry into Home Assistant.", "facts": ["Arduino / C++", "ESP32", "2023", "MQTT"], "hi": ["Real heat-pump telemetry (flow/return, ΔT)", "Reads the Daikin Altherma controller directly"], "tech": [["DS18B20 probes", "flow & return temperatures of the heating loop"], ["ESPAltherma", "reads the Daikin Altherma controller"], ["MQTT → Home Assistant", "heat-pump telemetry"]], "visual": "<div class=\"appwin iot\" data-w=\"380\" data-h=\"250\" style=\"width:380px;height:250px\"><div class=\"iottop\"><span class=\"iotchip\">ESP32</span> Heat-Pump Monitor<span class=\"iotlive\">● live</span></div><div class=\"iotbody\"><div class=\"rows\" style=\"gap:7px;justify-content:center\"><div class=\"iotrow\"><span>Flow (Vorlauf)</span><b class=\"tflow\">38.2 °C</b></div><div class=\"iotrow\"><span>Return (Rücklauf)</span><b class=\"tret\">32.1 °C</b></div><div class=\"iotrow\"><span>ΔT</span><b>6.1 K</b></div><div class=\"bars sm\"><i style=\"height:60%\"></i><i style=\"height:52%\"></i><i style=\"height:66%\"></i><i style=\"height:58%\"></i><i style=\"height:48%\"></i></div><div class=\"csub2\">DS18B20 probes · ESPAltherma (Daikin)</div></div></div></div>"}, {"id": "bookchat", "era": "py", "year": "2025", "title": "BookChat", "tag": "AI · multi-agent · Python", "blurb": "A chat-driven, multi-agent system that writes whole books autonomously.", "desc": "An LLM book-authoring system: a chat orchestrator turns natural language into structured JSON commands routed to specialised agents (Outline, Chapter, Character, QA, Memory). Hierarchical context loading keeps it within token limits while QA agents validate consistency.", "facts": ["Python", "LLM", "2025", "multi-agent"], "hi": ["A multi-agent architecture behind a chat orchestrator", "Hierarchical context loading to beat token limits"], "tech": [["Agent architecture", "Outline / Chapter / Character / QA / Memory agents"], ["Chat → JSON commands", "intent recognition into structured operations"], ["Context management", "hierarchical loading under token limits"], ["Automated QA", "consistency + continuity validation"]], "visual": "<div class=\"appwin gtk\" data-w=\"560\" data-h=\"300\" style=\"width:560px;height:300px\"><div class=\"tbar\"><span class=\"tico\"></span><span class=\"tcap\">BookChat - main.py</span><span class=\"tbtns\"><i>_</i><i>□</i><i>×</i></span></div><div class=\"wbody\"><div class=\"termwin grow\"><div class=\"tln cmd\">> write chapter 3 where the hero leaves the village</div><div class=\"tln dim\">ChatOrchestrator: intent=write_chapter ch=3</div><div class=\"tln \">→ OutlineAgent   placed the beat in act 1</div><div class=\"tln \">→ ChapterAgent   drafting ~1,800 words…</div><div class=\"tln ok\">→ QAAgent        consistency ✓  tone ✓</div><div class=\"tln dim\">→ MemoryAgent    hero.location = road</div></div></div></div>"}, {"id": "energy", "era": "hw", "year": "2024", "title": "Energy Dashboard", "tag": "Smart home · Go + React", "blurb": "A full energy-monitoring app for meter readings - validation, history and charts.", "desc": "A Go backend + React frontend (Docker, SQLite) that turns manual and automatic meter readings into validated, visualised energy data across electricity, gas, water and solar - the first analytics layer over the ESP sensors, later superseded by Wattwarden.", "facts": ["Go + React", "2024", "Docker", "SQLite"], "hi": ["A complete app: Go API + React UI + Docker, with ADRs", "The analytics layer over the home's meter sensors"], "tech": [["Go backend", "meter model: cumulative / periodic / derived"], ["React frontend", "charts + history"], ["Validation", "sanity-checks manual readings"], ["Docker + SQLite", "self-hosted"]], "visual": "<div class=\"appwin web\" data-w=\"560\" data-h=\"340\" style=\"width:560px;heigh arscreen\"><span>110&quot;</span><small>2.44 × 1.37 m</small></div><div class=\"armarker\"></div></div></div></div>"}, {"id": "detectatron", "era": "hw", "year": "2019", "title": "Detectatron · UniFi", "tag": "Smart home · CV · Java", "blurb": "Bridges a UniFi camera NVR to an object-detection service to score every clip.", "desc": "A Java companion service alongside a Ubiquiti UniFi NVR: it polls the NVR's MongoDB, and on each motion event exports the clip and posts it to the Detectatron object-detection service for scoring - so alerts only fire for things that matter (a person, a car).", "facts": ["Java", "2019", "MongoDB", "computer vision"], "hi": ["Made dumb motion alerts smart with object detection", "Integrated directly with the UniFi NVR database"], "tech": [["UniFi NVR + MongoDB", "polls the NVR database for events"], ["Clip export", "pulls the event video"], ["Object-detection scoring", "posts to Detectatron for classification"]], "visual": "<div class=\"appwin iot\" data-w=\"380\" data-h=\"250\" style=\"width:380px;height:250px\"><div class=\"iottop\"><span class=\"iotchip\">Java</span> Detectatron · UniFi<span class=\"iotlive\">● live</span></div><div class=\"iotbody\"><div class=\"camframe\"><span class=\"camrec\">● EVENT</span><span class=\"camts\">cam: driveway</span><span class=\"cambox det\"><span class=\"detlbl\">person · 0.94</span></span><span class=\"camlabel\">UniFi NVR → MongoDB poll → export → score</span></div><div class=\"csub2\">classifies motion events, flags what matters</div></div></div>"}, {"id": "wattwarden", "era": "hw", "year": "2025–26", "title": "Wattwarden", "tag": "Smart home · energy platform · Go", "blurb": "A sophisticated, self-built home-energy platform - live flow, heat-pump, solar, prices.", "desc": "The ambitious successor to the Energy Dashboard: a multi-repo Go platform (orchestrated via go.work + a private Gitea) with edge collectors, a “Vault” dashboard, a plugin SDK and its own protocol. It visualises the whole home metadata parsing + IRQ-driven playback"]], "visual": "<div class=\"appwin gtk\" data-w=\"560\" data-h=\"300\" style=\"width:560px;height:300px\"><div class=\"tbar\"><span class=\"tico\"></span><span class=\"tcap\">rasterklang - engine</span><span class=\"tbtns\"><i>_</i><i>□</i><i>×</i></span></div><div class=\"wbody\"><div class=\"termwin grow\"><div class=\"tln cmd\">$ rasterklang play Commando.sid</div><div class=\"tln dim\">PSID v2 - Rob Hubbard - 1 SID (6581)</div><div class=\"tln \">6510 CPU core (undocumented opcodes) - 64K C64 bus</div><div class=\"tln \">IRQ-driven playback @ 50 Hz - 3-voice SID, oversampled</div><div class=\"tln ok\">rendering  v1 saw   v2 pulse   v3 noise  |####------|</div></div></div></div>"}, {"id": "rk_cli", "era": "ai", "year": "2025", "title": "Rasterklang CLI", "tag": "Audio · Go · CLI", "blurb": "A command-line SID player and High Voltage SID Collection scanner.", "desc": "The command-line front-end to the engine: plays PSID/RSID tunes and scans the whole High Voltage SID Collection with type filters (RSID, BASIC, Magic Voice, speech engines and more).", "facts": ["Go", "2025", "HVSC", "CLI"], "hi": ["Plays and indexes thousands of SID tunes from the command line"], "tech": [["SID playback", "drives the Rasterklang engine"], ["HVSC scanning", "filter by tune type, exclude speech engines"], ["Type detection", "RSID / BASIC / Magic Voice / SAM ..."]], "visual": "<div class=\"appwin gtk\" data-w=\"560\" data-h=\"300\" style=\"width:560px;height:300px\"><div class=\"tbar\"><span class=\"tico\"></span><span class=\"tcap\">rasterklang - CLI</span><span class=\"tbtns\"><i>_</i><i>□</i><i>×</i></span></div><div class=\"wbody\"><div class=\"termwin grow\"><div class=\"tln cmd\">$ rasterklang scan ./HVSC -exclude-type \"Speech\"</div><div class=\"tln dim\">scanning the High Voltage SID Collection...</div><div class=\"tln \">Hubbard_Rob/Commando.sid     RSID   ok</div><div class=\"tln \">Galway_Martin/Wizball.sid    PSID   ok</div><div class=\"tln warn\">Demos/SAM_Reciter.sid        skipped (speech)</div><div class=\"tln ok\">12,431 tunes indexed</div></div></div></div>"}, {"id": "rk_wasm", "era": "ai", "year": "2025", "title": "Rasterklang WASM", "tag": "WebAssembly · Web Audio", "blurb": "A browser SDK that plays C64 SID tunes via Go WebAssembly and Web Audio.", "desc": "Packages the Go SID engine as a UI-free browser SDK (createRasterklang): a small JavaScript API to load .sid files, read PSID/RSID metadata, render SID audio as PCM chunks and play them through the Web Audio API.", "facts": ["Go + WASM", "2025", "Web Audio"], "hi": ["Learning to ship a Go engine to the browser via WebAssembly", "A clean JS SDK over a Go core"], "tech": [["Go to WebAssembly", "the whole engine compiled to WASM"], ["Web Audio API", "PCM chunks streamed to the browser"], ["JS SDK", "load / metadata / render / play"]], "visual": "<div class=\"appwin web\" data-w=\"560\" data-h=\"320\" style=\"width:560px;height:320px\"><div class=\"bbar\"><i></i><i></i><i></i><span class=\"url\">rasterklang-wasm - browser SDK</span></div><div class=\"wbody webbody web\"><div class=\"wasmwrap\"><pre class=\"wasmcode\">const rk = await createRasterklang();\nawait rk.load(sidBytes);   // PSID / RSID\nrk.play();                 // PCM to Web Audio</pre><div class=\"wasmbar\"><span class=\"wbp\">&#9654;</span><span class=\"wbn\">Commando.sid</span><span class=\"seek\" style=\"flex:1\"><i style=\"width:42%\"></i></span><span class=\"wbt\">1:12</span></div><div class=\"rknote\">Go to WebAssembly + the Web Audio API</div></div></div></div>"}, {"id": "rk_desktop", "era": "ai", "year": "2025", "title": "Rasterklang Desktop", "tag": "Desktop · Wails (Go + web)", "blurb": "A native desktop SID player wrapping the shared web UI in a Go/Wails shell.", "desc": "The native desktop player: it packages the shared web-player interface in a local Go/Wails shell and plays HVSC SID files, with search and an audio-insight view.", "facts": ["Go / Wails", "2025" tyle UI", "explorable, playful"]], "visual": "<div class=\"appwin web\" data-w=\"580\" data-h=\"330\" style=\"width:580px;height:330px\"><div class=\"bbar\"><i></i><i></i><i></i><span class=\"url\">rasterklang - interactive SID lab</span></div><div class=\"wbody webbody web\"><div class=\"labwrap\"><div class=\"labside\"><div class=\"labi sel\">Voices</div><div class=\"labi\">Filter</div><div class=\"labi\">ADSR</div><div class=\"labi\">Arps</div></div><div class=\"labmain\"><div class=\"labviz\"><i style=\"height:48%\"></i><i style=\"height:70%\"></i><i style=\"height:38%\"></i><i style=\"height:82%\"></i><i style=\"height:54%\"></i><i style=\"height:66%\"></i><i style=\"height:30%\"></i><i style=\"height:60%\"></i></div><div class=\"labrow\"><span>V1</span><b class=\"badge2\">saw</b><span>V2</span><b class=\"badge2\">pulse</b><span>V3</span><b class=\"badge2\">noise</b></div><div class=\"rknote\">an explorable, Spotify-style SID lab on the WASM SDK</div></div></div></div></div>"}, {"id": "rk_gpt", "era": "ai", "year": "2025", "title": "Rasterklang GPT", "tag": "Generative AI · SID", "blurb": "Generates playable C64 SID tunes by treating SID music as a language.", "desc": "An experiment in generative music: rather than synthesising audio, it learns and produces symbolic SID behaviour (song form, three-voice roles, register events, instrument patches, arpeggios, pulse-width and filter movement) that compiles to a real .sid file and is inspectable with the Rasterklang tools.", "facts": ["AI / ML", "2025", "symbolic SID"], "hi": ["Exploring whether SID music can be modelled as a constrained language", "Generated output compiles to a real, playable .sid"], "tech": [["Symbolic SID", "models register events, not raw audio"], ["Musical structure", "song form, themes, three-voice roles"], ["Compiles to PSID", "output is a real, inspectable .sid"]], "visual": "<div class=\"appwin gtk\" data-w=\"580\" data-h=\"300\" style=\"width:580px;height:300px\"><div class=\"tbar\"><span class=\"tico\"></span><span class=\"tcap\">rasterklang-gpt - SID generation</span><span class=\"tbtns\"><i>_</i><i>□</i><i>×</i></span></div><div class=\"wbody\"><div class=\"termwin grow\"><div class=\"tln cmd\">$ rasterklang-gpt generate --form AABA --key Cm</div><div class=\"tln dim\">treats SID music as a constrained language</div><div class=\"tln \">plan: theme A (8 bars) -> B -> A' ... three voices</div><div class=\"tln \">events: notes, arps, pulse-width, filter sweeps</div><div class=\"tln ok\">wrote out.sid - inspectable with the rasterklang tools</div></div></div></div>"}, {"id": "rk_convert", "era": "ai", "year": "2025", "title": "Rasterklang Convert", "tag": "Audio DSP · Go", "blurb": "A pragmatic audio-to-SID arranger that turns a song into a SID cover.", "desc": "A Go experiment that turns arbitrary audio into something SID-shaped: it decodes the audio, infers musical structure, reduces it to lead/bass/chord and drum roles and writes a PSID file with an embedded 50 Hz register-frame player. Not a faithful converter, but a fun arranger.", "facts": ["Go", "2025", "DSP"], "hi": ["Learning audio analysis: structure, roles and reduction"], "tech": [["Audio decode + analysis", "infers a song's musical structure"], ["Role reduction", "lead / bass / chord / drums"], ["PSID writer", "embeds a 50 Hz register-frame player"]], "visual": "<div class=\"appwin gtk\" data-w=\"560\" data-h=\"280\" style=\"width:560px;height:280px\"><div class=\"tbar\"><span class=\"tico\"></span><span class=\"tcap\">rasterklang-convert - audio to SID</span><span class=\"tbtns\"><i>_</i><i>□</i><i>×</i></span></div><div class=\"wbody\"><div class=\"termwin grow\"><div class=\"tln cmd\">$ rasterklang-convert song.wav out.sid</div><div class=\"tln dim\">decode -> infer structure -> reduce to roles</div><div class=\"tln \">lead / bass / chord / drums</div><div class=\"tln ok\">wrote a PSID with an embedded 50 Hz register player</div></div></div></div>"}, {"id": "aib", "era": "ai", "year": "2025", "title": "agent-in-a-box", "tag": "Dev tooling · Go · containers", "blurb": "Runs coding agents with full power, safely isolated in a per-project dev container.", "desc": "A Go CLI (aib) that runs coding agents (Claude Code, Codex, Zed, VS Code) inside a per-project dev container. The agent gets full autonomy (docker, git, ssh) but cannot reach the host: the workspace is bind-mounted, and everything else is fenced off by a filtering Docker proxy and an approval-gated SSH agent bridge.", "facts": ["Go", "2025", "Docker", "sandbox"], "hi": ["The middle ground between agent-on-host (risky) and a sealed sandbox (useless)", "A filtering Docker proxy + approval-gated SSH bridge"], "tech": [["Per-project dev container", "isolated box, workspace bind-mounted"], ["Filtering Docker proxy", "agent can run docker, but fenced"], ["Approval-gated SSH bridge", "controlled access to keys / remotes"], ["Go CLI (aib + aib-proxy)", "drives the whole flow"]], "visual": "<div class=\"appwin gtk\" data-w=\"580\" data-h=\"300\" style=\"width:580px;height:300px\"><div class=\"tbar\"><span class=\"tico\"></span><span class=\"tcap\">agent-in-a-box (aib)</span><span class=\"tbtns\"><i>_</i><i>□</i><i>×</i></span></div><div class=\"wbody\"><div class=\"aibwrap\"><div class=\"aibcol host\"><b>Host</b><span>your files</span><span>SSH keys</span></div><div class=\"aibgate\"><span>&#8644;</span>filtering proxy<br>+ approval-gated SSH</div><div class=\"aibcol box\"><b>Container</b><span>Claude Code / Codex</span><span>docker · git · ssh</span><span>full autonomy</span></div></div><div class=\"rknote\">run coding agents with full power, fenced off from the host</div></div></div>"}];
const ERA={vb:{name:"Visual Basic"},web:{name:"Web"},py:{name:"Python / Linux"},hw:{name:"Smart Home & IoT"},ai:{name:"SID & AI"}};
const host=document.getElementById('project-archive');const root=host.attachShadow({mode:'open'});
root.innerHTML='<style>'+CSS+'</style>'+INNER;
const grid=root.querySelector('#grid');const modal=root.querySelector('#modal');
function fit(scope){if(!scope)return;scope.querySelectorAll('.appwin').forEach(win=>{const h=win.parentElement;const w=+win.dataset.w,ht=+win.dataset.h;const aw=h.clientWidth,ah=h.clientHeight;let s=Math.min(aw*0.99/w,ah*0.99/ht);s=Math.min(s,2);win.style.transform='translate(-50%,-50%) scale('+s+')';});}
const counts={all:0};PROJECTS.forEach(p=>{counts.all++;counts[p.era]=(counts[p.era]||0)+1;});
root.querySelectorAll('.f').forEach(b=>{const em=b.querySelector('em');if(em)em.textContent=counts[b.dataset.era];});
PROJECTS.forEach((p,i)=>{const c=document.createElement('article');c.className='card '+p.era;c.dataset.era=p.era;c.dataset.year=(''+p.year).match(/\d{4}/)[0];
 c.innerHTML=`<div class="preview ${p.era}">${p.visual}</div><div class="cmeta"><div class="crow"><span class="badge ${p.era}">${ERA[p.era].name}</span><span class="cyear">${p.year}</span></div><h3>${p.title}</h3><div class="ctag">${p.tag}</div><p>${p.blurb}</p></div>`;
 c.addEventListener('click',()=>openModal(i));grid.appendChild(c);});
requestAnimationFrame(()=>fit(grid));
window.addEventListener('resize',()=>{fit(grid);fit(root.querySelector('#mstage'));});
(function(){var tl=root.querySelector('#tl');if(!tl)return;
function yo(p){var m=(''+p.year).match(/\d{4}/);return m?+m[0]:0;}
var ys=Array.from(new Set(PROJECTS.map(yo))).sort(function(a,b){return a-b;});
var ct={};PROJECTS.forEach(function(p){var y=yo(p);ct[y]=(ct[y]||0)+1;});
var mx=Math.max.apply(null,ys.map(function(y){return ct[y];}));
tl.innerHTML=ys.map(function(y){var sc=(0.5+0.5*ct[y]/mx).toFixed(2);return '<button class="tl-item" data-year="'+y+'" title="'+ct[y]+' in '+y+'"><i class="tl-dot" style="transform:scale('+sc+')"></i><b class="tl-yr">'+y+'</b></button>';}).join('');
var items=tl.querySelectorAll('.tl-item');
items.forEach(function(b){b.addEventListener('click',function(){var c=grid.querySelector('.card[data-year="'+b.dataset.year+'"]');if(c){var t=c.getBoundingClientRect().top+window.pageYOffset-80;window.scrollTo({top:t,behavior:'smooth'});}});});
function spy(){var cs=grid.querySelectorAll('.card'),cur=null;for(var i=0;i<cs.length;i++){if(cs[i].style.display==='none')continue;if(cs[i].getBoundingClientRect().top<160)cur=cs[i].dataset.year;}items.forEach(function(b){b.classList.toggle('active',b.dataset.year===cur);});}
window.addEventListener('scroll',spy,{passive:true});window.addEventListener('resize',spy);setTimeout(spy,60);
})();

root.querySelectorAll('.f').forEach(b=>b.addEventListener('click',()=>{root.querySelectorAll('.f').forEach(x=>x.classList.remove('active'));b.classList.add('active');const e=b.dataset.era;root.querySelectorAll('.card').forEach(c=>{c.style.display=(e==='all'||c.dataset.era===e)?'':'none';});requestAnimationFrame(()=>fit(grid));}));
let cur=0;
function openModal(i){i=((i%PROJECTS.length)+PROJECTS.length)%PROJECTS.length;cur=i;const p=PROJECTS[i];const st=root.querySelector('#mstage');st.innerHTML=p.visual;st.className='mstageinner '+p.era;root.querySelector('#mtitle').textContent=p.title;root.querySelector('#mdesc').textContent=p.desc;root.querySelector('#myear').textContent=p.year;const badge=root.querySelector('#mbadge');badge.textContent=ERA[p.era].name;badge.className='badge '+p.era;root.querySelector('#mfacts').innerHTML=p.facts.map(f=>`<span>${f}</span>`).join('');root.querySelector('#mtech').innerHTML=p.tech.map(t=>`<li><b>${t[0]}</b> - ${t[1]}</li>`).join('');root.querySelector('#mhi').innerHTML=p.hi.map(h=>`<li>${h}</li>`).join('');modal.classList.add('open');requestAnimationFrame(()=>fit(st));}
function close(){modal.classList.remove('open');}
root.querySelector('.mclose').addEventListener('click',close);root.querySelector('.mback').addEventListener('click',close);
root.querySelector('.mnav.prev').addEventListener('click',()=>openModal(cur-1));root.querySelector('.mnav.next').addEventListener('click',()=>openModal(cur+1));
document.addEventListener('keydown',e=>{if(!modal.classList.contains('open'))return;if(e.key==='Escape')close();else if(e.key==='ArrowLeft')openModal(cur-1);else if(e.key==='ArrowRight')openModal(cur+1);});
function applyTheme(){var d=document.body.getAttribute('theme')==='dark'||document.documentElement.getAttribute('theme')==='dark';var r=root.querySelector('.pa-root');if(r)r.classList.toggle('light',!d);}
applyTheme();
try{new MutationObserver(applyTheme).observe(document.body,{attributes:true,attributeFilter:['theme']});new MutationObserver(applyTheme).observe(document.documentElement,{attributes:true,attributeFilter:['theme','class']});}catch(e){}
})();
</script>
